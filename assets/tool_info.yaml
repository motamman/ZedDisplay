# Tool Information Configuration
# Used by ToolInfoButton to display tool descriptions, required plugins, and data sources

data_sources:
  signalk:
    name: "SignalK Server"
    url: "https://signalk.org/"
  weatherflow:
    name: "WeatherFlow Tempest"
    url: "https://tempest.earth/"
  openmeteo:
    name: "Open-Meteo"
    url: "https://open-meteo.com/"

plugins:
  signalk-parquet:
    name: "SignalK Parquet"
    description: "Stores historical data in Parquet format for efficient charting"
  anchoralarm:
    name: "Anchor Alarm Plugin"
    description: "Anchor watch with swing radius monitoring and alarms"
  signalk-rpi-monitor:
    name: "RPi Monitor"
    description: "Raspberry Pi system health monitoring (CPU, memory, temps)"
  signalk-rpi-uptime:
    name: "RPi Uptime"
    description: "Reports Raspberry Pi system uptime"
  signalk-weatherflow:
    name: "WeatherFlow"
    description: "Weather data from WeatherFlow Tempest stations"
  signalk-weather-api:
    name: "Weather API"
    description: "Generic weather API supporting multiple providers"
  derived-data:
    name: "Derived Data"
    description: "Calculates derived values like sun/moon times, true wind"
  open-meteo:
    name: "Open-Meteo"
    description: "Open-Meteo weather provider plugin"
  autopilot:
    name: "Autopilot Control"
    description: "Control autopilot heading and mode via SignalK"
  signalk-charts-provider-simple:
    name: "SignalK Charts Provider (Simple)"
    description: "Serves S-57 electronic navigational charts as MVT vector tiles to the Chart Plotter"

tools:
  historical_chart:
    name: "Historical Chart"
    description: |
      Display historical data with smoothing options.

      **Features:**
      - Up to 3 data paths on one chart
      - SMA/EMA smoothing with configurable windows
      - Dual Y-axis support for mixed units
      - Duration-adaptive time labels
      - Auto-refresh option
      - Most features should work with any history api plugin
    Designed_For:
      - signalk-parquet
    

  realtime_chart:
    name: "Real-time Chart"
    description: |
      Live streaming data chart with zone visualization.

      **Features:**
      - Real-time data updates via WebSocket
      - Alert zone overlays from SignalK meta
      - Configurable time window
      - Dual Y-axis for mixed units
    
    

  anchor_alarm:
    name: "Anchor Alarm"
    description: |
      Comprehensive anchor watch with visual monitoring.

      **Features:**
      - Interactive map with anchor/vessel positions
      - Configurable alarm radius and rode length
      - Polar plot view for swing analysis
      - Check-in reminder system
      - Audio alarms with multiple sound options
    required_plugins:
      - anchoralarm

  rpi_monitor:
    name: "RPi Monitor"
    description: |
      Raspberry Pi system health dashboard.

      **Displays:**
      - CPU utilization (overall + per-core bars)
      - CPU and GPU temperature with color coding
      - Memory and storage utilization
      - System uptime
    required_plugins:
      - signalk-rpi-monitor
      - signalk-rpi-uptime
    

  weatherflow_forecast:
    name: "WeatherFlow Forecast"
    description: |
      Weather forecast from WeatherFlow Tempest station.

      **Features:**
      - Current conditions display
      - Hourly and daily forecasts
      - Wind speed, direction, and gusts
      - Rain accumulation
      - Sun/Moon arc visualization

    required_plugins:
      - derived-data
      - signalk-weatherflow
    data_sources:
      - weatherflow
      

  weather_api_spinner:
    name: "Weather Forecast Spinner"
    description: |
      Interactive weather forecast tool.

      **Features:**
      - Multi-day forecast display
      - Day selection spinner
      - Hourly breakdown with icons
      - Sun/Moon times from derived-data
      - Supports multiple weather providers
      - Most features should work with any weather api plugin
    optional_plugins:
      - open-meteo
      - signalk-weatherflow
    required_plugins:
      - derived-data

    

  compass_gauge:
    name: "Compass Gauge"
    description: |
      Marine compass display with heading indicator.

      **Features:**
      - Up to 4 heading needles on one compass
      - Multiple styles (classic, arc, minimal, marine)
      - Configurable appearance
    

  wind_compass:
    name: "Wind Compass"
    description: |
      Autopilot-style compass with wind and navigation data.

      **Features:**
      - Heading (true/magnetic) display
      - Wind direction and speed (true/apparent)
      - SOG, COG, waypoint bearing
      - VMG optimization and laylines
    

  tanks_tool:
    name: "Tank Levels"
    description: |
      Display tank levels with visual indicators.

      **Features:**
      - Up to 5 tanks on one widget
      - Color-coded by tank type
      - Percentage and volume display
    

  autopilot_tool:
    name: "Autopilot Control"
    description: |
      Control autopilot heading and mode.

      **Features:**
      - Heading adjustment
      - Mode selection (standby, auto, wind)
      - Course lock and tracking
    required_plugins:
      - autopilot


  autopilot_v2:
    name: "Autopilot V2"
    description: |
      Reimagined autopilot control with center circle design.

      **Features:**
      - Heading adjustment (+/-1, +/-10)
      - Mode selection (standby, auto, wind)
      - Course lock and tracking
      - Compact circular layout
    required_plugins:
      - autopilot


  gnss_status:
    name: "GNSS Status"
    description: |
      GPS/GNSS satellite status display.

      **Features:**
      - Satellite count and signal strength
      - Fix quality indicator
      - Position accuracy
    

  position_display:
    name: "Position Display"
    description: |
      Current vessel position in lat/lon format.

      **Features:**
      - Formats: DD, DDM, DMS
      - Compact and full layout modes
      - Configurable labels
    

  victron_flow:
    name: "Victron Power Flow"
    description: |
      Victron electrical system visualization.

      **Features:**
      - Power flow diagram
      - Battery state of charge
      - Solar/shore power input
      - Load consumption
    

  server_manager:
    name: "Server Manager"
    description: |
      SignalK server administration.

      **Features:**
      - Plugin management (enable/disable)
      - Connection status
      - Server info
      - Select display units preference
    

  system_monitor:
    name: "Device Monitor"
    description: |
      Device system information.

      **Features:**
      - Battery level and charging status
      - Memory utilization and history chart
      - App uptime and exit status

  linear_gauge:
    name: "Linear Gauge"
    description: |
      Horizontal or vertical bar gauge display.

      **Features:**
      - Configurable min/max range
      - Color zones for warnings
      - Value labels

  radial_gauge:
    name: "Radial Gauge"
    description: |
      Circular dial gauge display.

      **Features:**
      - Configurable arc range
      - Color zones for alerts
      - Needle indicator

  text_display:
    name: "Text Display"
    description: |
      Simple numeric or text value display.

      **Features:**
      - Large readable numbers
      - Unit display
      - Configurable formatting

  radial_bar_chart:
    name: "Radial Bar Chart"
    description: |
      Circular progress bar visualization.

      **Features:**
      - Multiple values on one chart
      - Percentage display
      - Color coding

  slider_tool:
    name: "Slider Control"
    description: |
      Adjustable slider for SignalK PUT values.

      **Features:**
      - Send values to SignalK server
      - Configurable range of values
      - Real-time feedback
      - PUT support for any enabled numeric SignalK path

  switch_tool:
    name: "Switch Control"
    description: |
      Toggle switch for SignalK PUT values.

      **Features:**
      - On/Off state control
      - Send commands to SignalK
      - Visual feedback
      - PUT support for any enabled boolean SignalK path

  knob_tool:
    name: "Knob Control"
    description: |
      Rotary knob for value adjustment.

      **Features:**
      - Precise value control
      - Configurable range
      - Visual feedback
      - PUT support for any enabled numeric SignalK path

  dropdown_tool:
    name: "Dropdown Selector"
    description: |
      Dropdown menu for selecting values.

      **Features:**
      - Multiple option selection
      - Send values to SignalK
      - Configurable options
      - PUT support for any enabled SignalK path

  checkbox_tool:
    name: "Checkbox Control"
    description: |
      Checkbox for boolean SignalK values.

      **Features:**
      - True/false toggle
      - Send state to SignalK
      - Visual feedback
      - PUT support for any enabled boolean SignalK path

  attitude_indicator:
    name: "Attitude Indicator"
    description: |
      Aircraft-style artificial horizon display.

      **Features:**
      - Pitch and roll visualization
      - Real-time updates
      - Marine vessel orientation

  clock_alarm:
    name: "Clock & Alarm"
    description: |
      Clock display with alarm functionality.

      **Features:**
      - Multiple alarm settings
      - Countdown timers
      - Time zone support
      - Supports crew alarms

  weather_alerts:
    name: "Weather Alerts"
    description: |
      Display active local NWS weather warnings.

      **Features:**
      - NWS (National Weather Service) alerts
      - Severity color coding
      - Expandable alert details

    required_plugins:
      - signalk-nws-alerts

  webview_tool:
    name: "Web View"
    description: |
      Embedded web browser for external content.

      **Features:**
      - Load any URL
      - SignalK webapp integration
      - Fullscreen support

  user_management:
    name: "User Management"
    description: |
      SignalK user and permission management.

      **Features:**
      - Add/remove users
      - Permission settings
      - Access control

  plugin_config:
    name: "Plugin Configuration"
    description: |
      Configure SignalK plugin settings.

      **Features:**
      - Plugin parameters
      - Enable/disable plugins
      - Save configuration

  intercom:
    name: "Intercom"
    description: |
      Voice communication between devices.

      **Features:**
      - Push-to-talk
      - Multi-device support
      - Audio streaming

  crew_list:
    name: "Crew List"
    description: |
      Manage crew members and contacts.

      **Features:**
      - Crew roles
      - Status indicators


  crew_messages:
    name: "Crew Messages"
    description: |
      Send messages between crew devices.

      **Features:**
      - Text messaging
      - Message history
      - Notifications

  autopilot_simple:
    name: "Simple Autopilot"
    description: |
      Compact autopilot control panel.

      **Features:**
      - Heading display and adjustment
      - Mode selection (standby, auto, wind)
      - Engage/disengage control
    required_plugins:
      - autopilot

  polar_radar_chart:
    name: "Polar Radar Chart"
    description: |
      Polar radar chart for directional data visualization.

      **Features:**
      - Angle vs magnitude plotting
      - Configurable history duration
      - Real-time data streaming

  ais_polar_chart:
    name: "AIS Tracker"
    description: |
      AIS vessel tracking with radar and map views.

      **Views:**
      - **Radar** — polar chart with own vessel at center
      - **Map** — OpenStreetMap + OpenSeaMap overlay
      - Tap fullscreen to expand, then list button for overlay

      **Vessel Icons (colored by ship type):**
      - ![](icon:navigation) Chevron — moving vessel, pointed in heading direction
      - ![](icon:circle) Dot — stationary vessel (SOG ≈ 0)
      - ![](icon:anchor) Anchor — anchored vessel
      - ![](icon:local_parking) P icon — moored vessel

      **Vessel Details:**
      - Tap any vessel icon or projection dot to highlight and show details
      - Bottom sheet shows identity, dimensions, navigation, and relative data
      - Dismiss sheet to clear highlight; icon, projection line, and dots all revert

      **Color by Ship Type (MarineTraffic style):**
      - ![](icon:circle_green) Green — cargo
      - ![](icon:circle_brown) Brown — tanker
      - ![](icon:circle_blue) Blue — passenger
      - ![](icon:circle_orange) Orange — special craft: SAR, tug, pilot
      - ![](icon:circle_purple) Purple — sailing
      - ![](icon:circle_cyan) Cyan — fishing, towing
      - ![](icon:circle_light_grey) Light grey — AIS Class A, ship type not broadcast
      - ![](icon:circle_grey) Grey — unknown class or type
      - Icon opacity fades with data age: bright = live, dim = stale
      - Red X overlay on vessels with no update for 10+ minutes

      **Projected Positions:**
      - Dashed lines from moving vessels along their course
      - Dot marks at 30s, 1m, 15m, and 30m projected positions
      - Only shown for vessels with SOG > 0.1 m/s

      **CPA/TCPA:**
      - Closest Point of Approach calculated per vessel
      - Red badge when CPA < 0.5 nm, orange otherwise

      **AIS Status (optional — requires sk-ais-status-plugin):**
      - Confirmed — full brightness, active track
      - Unconfirmed — dimmed, insufficient report continuity
      - Lost — greyed out with stale indicator, no recent reports
      - Remove — greyed out with stale indicator, server flagged for removal
      - Falls back to timestamp-based freshness if plugin not installed

      **Controls (top-right buttons):**
      - ![](icon:fullscreen) Fullscreen square — expand radar/map to fill widget
      - ![](icon:list) List lines — toggle vessel list overlay (fullscreen only)
      - ![](icon:map)/![](icon:radar) Map/radar icon — switch between views
      - ![](icon:add)/![](icon:remove) Plus/minus — zoom in/out
      - ![](icon:my_location) Crosshair — auto-range (radar) or auto-follow (map)

      **Find Home Integration:**
      - Tap a vessel in the detail sheet to set it as the Find Home target
      - Requires the Find Home widget mounted on any screen
      - AIS receiver (or AIS data source) required for vessel positions

  file_share:
    name: "File Share"
    description: |
      Share files between crew devices.

      **Features:**
      - Send files to other devices
      - File list and download
      - Crew profile integration

  device_access_manager:
    name: "Device Access Manager"
    description: |
      Manage device access permissions.

      **Features:**
      - Approve/deny device requests
      - View connected devices
      - Revoke access

  find_home:
    name: "Find Home"
    description: |
      ILS-style approach display for navigating back to your anchored vessel — on foot, by dinghy, or swimming.

      **How it works:**
      - Uses your phone's GPS for position, course, and speed
      - Shows a runway-style deviation indicator pointing toward the boat
      - Haptic feedback guides you without looking at the screen: 1 buzz = turn port, 2 buzzes = turn starboard, 3 rapid = wrong way

      **Display:**
      - Runway centerline with lateral deviation bars
      - Distance to boat (auto-switches nautical miles ↔ close-range units)
      - COG (your heading) and bearing to boat
      - YOU speed (your device GPS) and BOAT speed (vessel SOG from SignalK)
      - ETA based on current speed

      **Setting Home Position:**
      - Tap the edit icon next to FIND HOME to open the map picker
      - Tap the map, enter coordinates manually, or use current vessel position from SignalK
      - Long-press the X to clear a manual position and revert to SignalK

      **Audio & Haptic Feedback:**
      - Configurable vibration patterns and interval
      - Optional whistle/audio feedback with selectable alert sound
      - Wrong-way detection with urgent triple-buzz alert

      **AIS Vessel Tracking:**
      - Select an AIS vessel as your target from the AIS Tracker widget
      - Runway updates in real time using the tracked vessel's position
      - Requires the AIS Tracker widget mounted on any screen and an AIS receiver (or AIS data source)

      **Track Mode:**
      - Toggle Track to navigate using the vessel's SignalK position instead of device GPS
      - Useful when your phone is aboard and you want boat-to-target guidance

      **Units:**
      - All conversions follow server unit preferences (speed, distance)
      - Falls back to raw SI (m/s, meters) when no metadata available

  historical_data_explorer:
    name: "Historical Explorer"
    description: |
      Explore historical SignalK data by geographic area.

      **How to use:**
      - Long press the map to choose Bounding Box or Radius mode
      - Tap to define the area (2 taps)
      - Configure date range, paths, aggregation, and smoothing
      - View results in summary bar and detail table

      **Features:**
      - Bounding box and radius spatial queries
      - Up to 5 data paths with automatic batching
      - SMA/EMA smoothing options
      - Unit conversion via server preferences
      - OpenSeaMap nautical chart overlay
      - Homeport quick-center button
    required_plugins:
      - signalk-parquet

  forecast_spinner:
    name: "Forecast Spinner"
    description: |
      Weather forecast day selector.

      **Features:**
      - Multi-day forecast
      - Hourly details
      - Weather icons
    optional_plugins:
      - open-meteo
      - signalk-weatherflow
    required_plugins:
      - derived-data

  chart_plotter_v3:
    name: "Chart Plotter"
    description: |
      Native-paint interactive chart plotter with S-57 electronic
      navigational charts, AIS traffic, route activation, measuring
      ruler, and offline chart caching.

      The chart is rendered directly by a Flutter `CustomPainter`
      driven by `s52_dart` — no WebView, no JavaScript bridge. OSM
      raster tiles provide the basemap; MVT vector tiles from the
      SignalK charts plugin provide S-57 features styled with the
      IHO S-52 Presentation Library symbology.

      **Map controls (top-right column):**
      - ![](icon:navigation) / ![](icon:navigation_outlined) Bow arrow — toggle heading-up vs north-up. Heading-up rotates the map so the vessel's bow is always screen-up; north-up keeps north at the top.
      - ![](icon:my_location) / ![](icon:location_searching) Crosshair — "Snap to vessel" lock. When on, the map is glued to the vessel position; pan gestures are disabled (pinch-zoom and rotation still work). Tap to unlock free panning.
      - ![](icon:layers) Stacked squares — open the chart-layer panel.
      - ![](icon:route) Route path — open the route manager.
      - ![](icon:download) Down arrow — open the offline chart download sheet.
      - ![](icon:straighten) / ![](icon:straighten_outlined) Ruler — toggle the measuring ruler (two draggable endpoints that report distance + bearing).
      - ![](icon:sailing) / ![](icon:sailing_outlined) Sail — toggle AIS traffic overlay.
      - ![](icon:filter_alt) / ![](icon:filter_alt_outlined) Funnel — when AIS is on, filter to active targets only vs all.
      - ![](icon:timeline) / ![](icon:linear_scale) Timeline — when AIS is on, toggle projected-track tails.

      **Tap to identify features:**
      - Tap any buoy, light, beacon, obstruction, wreck, landmark, or area edge to open the feature popover.
      - Popover groups nearby features and sorts them by S-52 display priority; points beat lines beat polygons when both are in range.
      - Popover is dismissed by tapping the map outside it, swiping it down, or tapping another feature.

      **Chart layer panel:**
      - ![](icon:map_outlined) Map — basemap source (OSM / CARTO / Stadia variants).
      - ![](icon:layers) Layers — S-57 overlay source.
      - ![](icon:drag_handle) Grip — drag to reorder stacked layers.
      - ![](icon:close) X — remove a layer from the stack.
      - ![](icon:add) Plus — add a new layer.
      - Opacity slider per layer.

      **Route manager:**
      - ![](icon:route) Route list — tap to preview a server-stored route.
      - ![](icon:play_arrow) Green play — activate the route forward.
      - ![](icon:play_arrow) Red play — activate the route reversed.
      - ![](icon:edit) Pencil — edit route (drag waypoints on the chart after activation).
      - ![](icon:delete_outline) Trash — delete the route from the server.
      - ![](icon:swap_horiz) Swap — reverse the currently-active route in place.
      - ![](icon:stop_circle_outlined) Stop — deactivate the current route.
      - ![](icon:near_me) Arrow — skip to a specific waypoint.
      - Waypoint icons: ![](icon:flag) active / ![](icon:check_circle) past / ![](icon:circle_outlined) upcoming.

      **HUD (bottom strip):**
      - Live SOG, COG, DPT, DTW (distance to waypoint), BRG, XTE.
      - ![](icon:skip_next) / ![](icon:fast_forward) Advance waypoint when on an active route.
      - Freshness chip (bottom right) shows tile-cache state: Fresh / Aging / Stale / Uncached.

      **Offline chart cache:**
      - Download a region at selected zoom levels for off-grid use.
      - Cache-first, background-refresh: served from disk when available; silently re-validated upstream.
      - Freshness chip surfaces tile staleness at a glance.

      **Auto-zoom (enabled while Snap-to-vessel is on):**
      - At ≤ 0.3 m/s SOG, holds zoom as-is.
      - While moving, if land is within a 15-minute look-ahead at current speed, tightens to nearest-land × 1.3 (min 300 m buffer).
      - Otherwise a 30-minute look-ahead area. Camera fit clamped to zoom 10..16.

      **Data flow:**
      - Own-vessel position, heading, COG, SOG: `navigation.position`, `.headingTrue`, `.courseOverGroundTrue`, `.speedOverGround`.
      - AIS targets via the SignalK AIS registry.
      - Active route via the SignalK course API (`navigation.course.activeRoute` and related).
      - S-57 vector tiles via `signalk-charts-provider-simple`.

      **Credits:**
      - IHO — S-52 Presentation Library and S-57 Object Catalogue (normative references).
      - [OpenCPN](https://github.com/OpenCPN/OpenCPN) (GPL-2.0) — S-52 chart symbols, lookup tables, and colour tables. The bundled `chartsymbols.xml` and `rastersymbols-*.png` atlases derive from OpenCPN's `data/s57data/` artifacts; see `packages/s52_dart/LICENSE-NOTICES` and `devdocs/chart-plotter-v3-sprite-report.md`.
      - [Freeboard-SK](https://github.com/SignalK/freeboard-sk) (Apache-2.0) — reference implementation whose CS-procedure structure (`DEPARE01`, `OBSTRN04`, `SOUNDG02`, etc.) was ported to Dart. See `packages/s52_dart/LICENSE-NOTICES`.
      - [flutter_map](https://pub.dev/packages/flutter_map) — map viewport and interaction framework.
      - [vector_tile](https://pub.dev/packages/vector_tile) — MVT protobuf decoder.
      - [OpenStreetMap](https://www.openstreetmap.org/) and CARTO / Stadia — basemap tile sources (attributions show in their respective layers).
      - [signalk-charts-provider-simple](https://github.com/SignalK/signalk-charts-provider-simple) — upstream MVT tile supply from SignalK server.
    required_plugins:
      - signalk-charts-provider-simple
    optional_plugins:
      - autopilot
    data_sources:
      - signalk

