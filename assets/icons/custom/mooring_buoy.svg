<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="45"/>
    </clipPath>
  </defs>
  <!-- White ball -->
  <circle cx="50" cy="50" r="45" fill="white" stroke="#ccc" stroke-width="1.5"/>
  <!-- Blue stripe clipped to circle -->
  <rect x="0" y="38" width="100" height="24" fill="#1565C0" clip-path="url(#circle-clip)"/>
  <!-- Subtle shading for roundness -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#bbb" stroke-width="1"/>
</svg>
