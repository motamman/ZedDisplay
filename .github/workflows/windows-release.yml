name: Windows Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'          # All platforms
      - 'v*.*.*-windows'  # Windows only

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    # Skip if this is an iOS-only, Android-only, or Linux-only tag
    if: ${{ !endsWith(github.ref, '-ios') && !endsWith(github.ref, '-android') && !endsWith(github.ref, '-linux') && !endsWith(github.ref, '-macos') && !endsWith(github.ref, '-bookworm') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Verify Flutter version
        run: |
          flutter --version
          flutter doctor -v

      - name: Clean and get dependencies
        run: |
          flutter clean
          flutter pub get

      # CMake >=3.28 (shipped on windows-latest) refuses to extract an archive
      # whose path traverses a symlink. flutter_webrtc 1.3.0 downloads and
      # extracts libwebrtc.zip in place under Flutter's .plugin_symlinks dir, so
      # the build fails ("Cannot extract through symlink"). Pin CMake to 3.27,
      # which doesn't have that hardening. Revisit once flutter_webrtc can be
      # unpinned past <1.3.1 (blocked by its broken iOS podspec).
      - name: Pin CMake 3.27 (flutter_webrtc symlink-extract workaround)
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.27.9'

      - name: Build Windows release
        run: flutter build windows --release

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "zed-display-windows-x64-${{ steps.version.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            zed-display-windows-x64-${{ steps.version.outputs.VERSION }}.zip
