name: iOS Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'      # Both platforms
      - 'v*.*.*-ios'  # iOS only

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    # Skip if this is an Android-only tag
    if: ${{ !endsWith(github.ref, '-android') && !endsWith(github.ref, '-linux') && !endsWith(github.ref, '-windows') && !endsWith(github.ref, '-macos') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Clean all caches
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf ~/.pub-cache
          rm -rf ios/Pods ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          pod cache clean --all || true

      - name: Get fresh dependencies
        run: |
          flutter pub get
          # Resolve s52_dart's own dev_dependencies (test, lints) so the
          # analyzer can see `package:test/test.dart` etc. when it walks
          # packages/s52_dart/test/*.dart. Without this, every test file
          # in the workspace package shows hundreds of undefined-function
          # errors during analyze.
          (cd packages/s52_dart && dart pub get)
          echo "=== Analyzing ==="
          flutter analyze --no-fatal-infos || true

      - name: Build iOS IPA
        uses: cedvdb/action-flutter-build-ios@v1
        with:
          build-cmd: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          certificate-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          certificate-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          provisioning-profile-base64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          keychain-password: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

      - name: Find IPA file
        id: find_ipa
        run: |
          echo "=== Looking for IPA files ==="
          find build -name "*.ipa" 2>/dev/null || true
          ls -la build/ios/ipa/ 2>/dev/null || true
          IPA_PATH=$(find build -name "*.ipa" -type f | head -1)
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_OUTPUT
          echo "Found IPA at: $IPA_PATH"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Read release notes
        id: release_notes
        run: |
          # Use TESTFLIGHT.txt if available, otherwise WHATSNEW.md
          if [ -f TESTFLIGHT.txt ]; then
            NOTES=$(cat TESTFLIGHT.txt)
          else
            NOTES=$(cat WHATSNEW.md)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          IPA_PATH: ${{ steps.find_ipa.outputs.IPA_PATH }}
        # Direct altool call instead of apple-actions/upload-testflight-build
        # because that action treats an altool exit code of 0 as success even
        # when altool itself printed an `ERROR:` line and Apple rejected the
        # upload (e.g. "required agreement is missing or has expired"). Here
        # we fail the step explicitly when altool reports any ERROR or when
        # the exit code is non-zero.
        run: |
          set -uo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8"
          printf '%s' "$API_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          trap 'rm -f "$KEY_FILE"' EXIT

          set +e
          OUTPUT=$(xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --output-format xml 2>&1)
          ALTOOL_EXIT=$?
          set -e

          echo "$OUTPUT"

          if [ "$ALTOOL_EXIT" -ne 0 ]; then
            echo "::error::altool exited with code $ALTOOL_EXIT"
            exit "$ALTOOL_EXIT"
          fi
          if echo "$OUTPUT" | grep -qE '^[[:space:]]*[0-9-]+ +[0-9:.]+ +ERROR:'; then
            echo "::error::altool reported an upload error (App Store Connect rejection)"
            exit 1
          fi
          if echo "$OUTPUT" | grep -qE 'were not uploaded because they had problems'; then
            echo "::error::altool reported package(s) not uploaded"
            exit 1
          fi
          echo "TestFlight upload accepted by App Store Connect."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/ios/ipa/*.ipa
