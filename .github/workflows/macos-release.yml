name: macOS Build and Release

on:
  push:
    tags:
      - 'v*.*.*'        # All platforms
      - 'v*.*.*-macos'  # macOS only

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15
    # Skip if this is a platform-specific tag for another platform
    if: ${{ !endsWith(github.ref, '-ios') && !endsWith(github.ref, '-android') && !endsWith(github.ref, '-linux') && !endsWith(github.ref, '-windows') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Clean all caches
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf ~/.pub-cache
          rm -rf macos/Pods macos/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          pod cache clean --all || true

      - name: Get fresh dependencies
        run: |
          flutter pub get
          echo "=== Analyzing ==="
          flutter analyze --no-fatal-infos || true

      - name: Install Apple certificate and provisioning profile
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.provisionprofile
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode from base64
          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import app signing certificate to keychain
          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          # Decode and import installer certificate
          INSTALLER_CERT_PATH=$RUNNER_TEMP/installer_certificate.p12
          echo -n "$MACOS_INSTALLER_CERTIFICATE_BASE64" | base64 --decode -o $INSTALLER_CERT_PATH
          security import $INSTALLER_CERT_PATH -P "$MACOS_INSTALLER_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build macOS release
        run: flutter build macos --release

      - name: Archive and export
        run: |
          cd macos
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ZedDisplay.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ZedDisplay.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Find PKG file
        id: find_pkg
        run: |
          echo "=== Looking for exported files ==="
          ls -la $RUNNER_TEMP/export/
          PKG_PATH=$(find $RUNNER_TEMP/export -name "*.pkg" -type f | head -1)
          if [ -z "$PKG_PATH" ]; then
            echo "No .pkg found, looking for .app"
            APP_PATH=$(find $RUNNER_TEMP/export -name "*.app" -type d | head -1)
            echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          else
            echo "PKG_PATH=$PKG_PATH" >> $GITHUB_OUTPUT
          fi

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Read release notes
        id: release_notes
        run: |
          if [ -f TESTFLIGHT.txt ]; then
            NOTES=$(cat TESTFLIGHT.txt)
          else
            NOTES=$(cat WHATSNEW.md)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.find_pkg.outputs.PKG_PATH || steps.find_pkg.outputs.APP_PATH }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Clean up keychain
        if: ${{ always() }}
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
